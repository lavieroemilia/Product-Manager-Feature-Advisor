<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Feature Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --surface: #161616; --surface2: #1e1e1e;
  --border: #2a2a2a; --border-hover: #3a3a3a;
  --accent: #c8f04d; --accent-dim: #a8cc3a;
  --text: #f0ede6; --text-muted: #888; --text-dim: #555;
  --danger: #ff6b6b; --warning: #ffc96b; --success: #6bffb8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; line-height: 1.7; }
.app { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 6rem; }
.header { margin-bottom: 3rem; opacity: 0; animation: fadeUp 0.6s ease forwards; }
.header-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 2.4rem; font-weight: 400; line-height: 1.15; }
.header h1 em { font-style: italic; color: var(--accent); }
.progress-wrap { margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards; }
.progress-stages { display: flex; gap: 4px; margin-bottom: 0.5rem; }
.progress-stage { flex: 1; height: 3px; background: var(--border); border-radius: 2px; transition: background 0.4s; }
.progress-stage.active { background: var(--accent); }
.progress-stage.done { background: var(--accent-dim); opacity: 0.5; }
.progress-label { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }
.progress-label span { color: var(--accent); }
.stage-tag { display: inline-block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 3px 10px; border-radius: 20px; margin-bottom: 0.75rem; }
.stage-source { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.question-block { margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.5s ease forwards; }
.question-text { font-family: 'DM Serif Display', serif; font-size: 1.25rem; font-weight: 400; margin-bottom: 0.4rem; line-height: 1.4; }
.question-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5; }
.alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 0.75rem; line-height: 1.5; }
.alert-warning { background: rgba(255,201,107,0.08); border: 1px solid rgba(255,201,107,0.3); color: var(--warning); }
.alert-discovery { background: rgba(200,240,77,0.06); border: 1px solid rgba(200,240,77,0.25); color: var(--accent); }
.options { display: flex; flex-direction: column; gap: 8px; }
.option { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 15px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); text-align: left; transition: all 0.2s; line-height: 1.4; }
.option:hover { border-color: var(--accent); background: var(--surface2); }
.option.selected { border-color: var(--accent); background: rgba(200,240,77,0.07); color: var(--accent); }
.option.selected .option-note { color: rgba(200,240,77,0.6); }
.option-note { font-size: 12px; color: var(--text-dim); margin-top: 3px; display: block; }
.option-unclear { border-style: dashed; border-color: var(--text-dim); color: var(--text-muted); }
.option-unclear:hover { border-color: var(--warning); color: var(--warning); background: rgba(255,201,107,0.05); }
.option-unclear.selected { border-color: var(--warning); background: rgba(255,201,107,0.07); color: var(--warning); }
.suggestions-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; margin-top: 1rem; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.suggestion-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; line-height: 1.3; }
.suggestion-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,77,0.05); }
.suggestion-chip.used { border-color: rgba(200,240,77,0.4); color: rgba(200,240,77,0.7); background: rgba(200,240,77,0.05); }
.text-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; line-height: 1.6; }
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { color: var(--text-dim); }

/* Discovery guidance box */
.discovery-box { background: rgba(200,240,77,0.04); border: 1px solid rgba(200,240,77,0.2); border-radius: 10px; padding: 18px 20px; margin-top: 1rem; opacity: 0; animation: fadeUp 0.4s ease forwards; }
.discovery-box-title { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.discovery-box p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }
.discovery-box p:last-child { margin-bottom: 0; }
.discovery-step { display: flex; gap: 10px; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.discovery-step-num { color: var(--accent); font-weight: 500; flex-shrink: 0; min-width: 18px; }
.discovery-note { font-size: 12px; color: var(--text-dim); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-style: italic; }

.nav-row { display: flex; gap: 12px; margin-top: 1.5rem; align-items: center; }
.btn-next { background: var(--accent); color: #0f0f0f; border: none; border-radius: 8px; padding: 11px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-next:hover { background: var(--accent-dim); }
.btn-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 11px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
.btn-back:hover { border-color: var(--border-hover); color: var(--text); }
.q-counter { font-size: 12px; color: var(--text-dim); margin-top: 1rem; }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

/* Output */
.output { opacity: 0; animation: fadeUp 0.6s ease forwards; }
.output-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 0.4rem; }
.output-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 2rem; }
.output-section { margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.output-section-header { padding: 11px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.output-section-tag { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
.output-section-title { font-size: 14px; font-weight: 500; }
.output-section-source { font-size: 11px; color: var(--text-dim); margin-left: auto; }
.output-section-body { padding: 16px 18px; }
.output-row { margin-bottom: 12px; font-size: 14px; line-height: 1.6; }
.output-row:last-child { margin-bottom: 0; }
.output-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 3px; }
.pending-badge { display: inline-block; background: rgba(255,201,107,0.1); border: 1px solid rgba(255,201,107,0.3); color: var(--warning); font-size: 11px; padding: 2px 10px; border-radius: 20px; margin-bottom: 6px; }
.pending-task { font-size: 13px; color: var(--text-muted); padding: 8px 12px; background: rgba(255,201,107,0.04); border-left: 2px solid rgba(255,201,107,0.3); border-radius: 0 6px 6px 0; margin-top: 6px; line-height: 1.5; }
.risk-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.risk-row:last-child { border-bottom: none; }
.risk-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.risk-high { background: rgba(255,107,107,0.15); color: var(--danger); border: 1px solid rgba(255,107,107,0.3); }
.risk-med { background: rgba(255,201,107,0.15); color: var(--warning); border: 1px solid rgba(255,201,107,0.3); }
.risk-low { background: rgba(107,255,184,0.15); color: var(--success); border: 1px solid rgba(107,255,184,0.3); }
.metric-chip { display: inline-block; background: rgba(200,240,77,0.1); border: 1px solid rgba(200,240,77,0.3); color: var(--accent); font-size: 12px; padding: 4px 10px; border-radius: 20px; margin: 3px 3px 3px 0; }
.download-row { margin-top: 2rem; display: flex; gap: 12px; flex-wrap: wrap; }
.btn-download { background: var(--accent); color: #0f0f0f; border: none; border-radius: 8px; padding: 12px 28px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-download:hover { background: var(--accent-dim); }
.btn-restart { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
.btn-restart:hover { border-color: var(--border-hover); color: var(--text); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-eyebrow">Product Manager Framework</div>
    <h1>Feature<br><em>Advisor</em></h1>
    <div id="forgetKeyWrap" style="display:none;margin-top:0.75rem;">
      <button onclick="forgetKey()" style="background:none;border:none;font-size:11px;color:var(--text-dim);cursor:pointer;padding:0;letter-spacing:0.05em;font-family:'DM Sans',sans-serif;">
        Olvidar API key
      </button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-stages" id="progressStages"></div>
    <div class="progress-label">
      <span id="progressLabel">Etapa 1 de 7</span>
      <span id="progressName">Contexto</span>
    </div>
  </div>
  <div id="stageContainer"></div>
</div>
<script>
const ans = {};
let cs = 0, cq = 0;
let lastBrief = null;

// ── DISCOVERY GUIDANCE ───────────────────────────────────────────────────────
const DISCOVERY = {
  outcome: {
    title: "Falta definir el aha moment",
    why: "Sin saber qué cambio de comportamiento define el éxito, cualquier feature que construyas es una apuesta sin hipótesis. Seiden: un outcome es un cambio medible en el comportamiento humano — no una feature entregada.",
    steps: [
      { n: "1", t: "Analiza datos de comportamiento: compara qué hicieron en su primera sesión los usuarios que se quedaron vs. los que se fueron. Busca la acción que los separa." },
      { n: "2", t: "Si no tienes datos: instrumenta el comportamiento de la primera hora durante 2 semanas. Registra cada acción y cuándo ocurre." },
      { n: "3", t: "Entrevistas Mom Test con 3–5 usuarios que se quedaron: 'Cuéntame qué hiciste la primera vez que usaste el producto. ¿Cuándo decidiste que valía la pena?'" },
      { n: "4", t: "Entrevistas Mom Test con 3–5 usuarios que pidieron la baja: 'Cuéntame qué pasó en tu primera sesión. ¿En qué momento sentiste que no era para ti?'" }
    ],
    note: "Mientras no tengas el aha moment identificado, no puedes definir qué construir. Este es el trabajo más importante ahora mismo."
  },
  negocio: {
    title: "Falta conectar el problema con el negocio",
    why: "Seiden: Output → Outcome → Impact. Si no puedes trazar la línea entre el comportamiento del usuario y una métrica de negocio, la feature no tiene justificación estratégica.",
    steps: [
      { n: "1", t: "Pregúntate: si el usuario hace X más frecuentemente, ¿qué métrica de negocio mejora directamente? (churn, MRR, CAC, NPS, referidos)" },
      { n: "2", t: "Valida con datos: ¿hay correlación histórica entre esa acción y esa métrica? ¿Los usuarios que hicieron X tuvieron mejor retención?" },
      { n: "3", t: "Habla con el negocio: ¿cuál es la métrica que más preocupa al equipo ahora mismo? Esa es la que debes conectar." }
    ],
    note: "Si no puedes conectar el outcome con el negocio, puede que estés resolviendo el problema incorrecto."
  },
  problema_resumen: {
    title: "Falta validar el problema con usuarios reales",
    why: "Torres: las oportunidades vienen de entrevistas, no de suposiciones. Si no tienes conversaciones reales que respalden el problema, cualquier solución es una apuesta.",
    steps: [
      { n: "1", t: "Haz 3–5 entrevistas Mom Test: 'Cuéntame la última vez que usaste el producto. ¿Qué intentabas hacer? ¿Qué pasó?'" },
      { n: "2", t: "No preguntes si les gustaría X. Pregunta qué hicieron la última vez que tuvieron ese problema." },
      { n: "3", t: "Busca el patrón: ¿el mismo problema aparece en al menos 3 conversaciones distintas sin que tú lo sugieras?" }
    ],
    note: "Una entrevista entusiasta no es señal. El patrón aparece en la repetición."
  },
  supuesto_critico: {
    title: "Falta identificar el supuesto más arriesgado",
    why: "Torres y Maurya: toda solución descansa sobre supuestos. El más peligroso es el que, si es falso, tumba toda la feature. Identificarlo es el primer paso antes de cualquier experimento.",
    steps: [
      { n: "1", t: "Lista todos los supuestos de tu solución: ¿qué tiene que ser verdad para que funcione?" },
      { n: "2", t: "Para cada supuesto: ¿qué tan probable es que sea falso? ¿Qué tan grave sería si lo fuera?" },
      { n: "3", t: "El supuesto con mayor combinación de incertidumbre + impacto es el crítico. Testa ese primero." }
    ],
    note: "Maurya: si no sabes cuál es tu supuesto más arriesgado, estás construyendo sin hipótesis."
  },
  experimento: {
    title: "Falta definir el experimento mínimo",
    why: "Maurya: el experimento más valioso es el más pequeño que puede refutar tu hipótesis. Construir el producto completo para validar es el error más caro en producto.",
    steps: [
      { n: "1", t: "Entrevista de problema (Mom Test): 5 conversaciones para confirmar que el problema existe y duele." },
      { n: "2", t: "Entrevista de solución (Maurya): muestra una demo o mockup simple. No el producto — una representación de la idea." },
      { n: "3", t: "Concierge MVP: resuelve el problema manualmente para 3 usuarios y mide si cambia su comportamiento." }
    ],
    note: "Si no sabes cómo testear el supuesto esta semana, el supuesto está mal formulado."
  },
  omtm: {
    title: "Falta definir qué medir",
    why: "Lean Analytics: la OMTM es la que responde la pregunta más importante del equipo ahora mismo. Sin ella, cualquier resultado puede interpretarse como éxito.",
    steps: [
      { n: "1", t: "Pregúntate: si esta feature funciona perfectamente, ¿qué número cambiaría primero y más claramente?" },
      { n: "2", t: "Esa métrica debe ser accionable: si cambia, tienes que cambiar algo. Si no te obliga a decidir, es vanity metric." },
      { n: "3", t: "Revisa los benchmarks de Lean Analytics para tu etapa y modelo para saber si el número que eliges es alcanzable." }
    ],
    note: "Una métrica que siempre sube no es una métrica — es una vanity metric disfrazada."
  },
  benchmark: {
    title: "Falta definir el criterio de éxito",
    why: "Lean Analytics: si no defines el benchmark antes de lanzar, interpretarás los resultados a conveniencia. El criterio de éxito debe fijarse antes del experimento.",
    steps: [
      { n: "1", t: "Busca el benchmark de la industria para tu modelo y etapa (Lean Analytics los incluye por modelo)." },
      { n: "2", t: "Mide el estado actual de esa métrica antes de lanzar — esa es tu línea de base." },
      { n: "3", t: "Define: ¿qué mejora mínima en esa métrica justifica el tiempo invertido en esta feature?" }
    ],
    note: "Sin línea de base no puedes medir el impacto. Mide antes de lanzar."
  },
  solucion_propuesta: {
    title: "Falta definir la solución",
    why: "Singer: no puedes hacer shaping de algo que no está validado. Vuelve a las etapas de oportunidad y validación antes de dar forma a la solución.",
    steps: [
      { n: "1", t: "Completa las etapas de discovery y validación primero — especialmente el supuesto crítico." },
      { n: "2", t: "Con el supuesto validado, genera 15–20 posibles soluciones (Torres) antes de elegir una." },
      { n: "3", t: "Elige la solución con mejor balance entre impacto esperado y complejidad. Esa es la que describes aquí." }
    ],
    note: "Singer: dar forma a una solución no validada es el error más común antes de un ciclo de desarrollo."
  },
  riesgo_principal: {
    title: "Falta evaluar los riesgos",
    why: "Cagan: los cuatro riesgos deben evaluarse antes de comprometer recursos. Si no sabes cuál es el más alto, todos son igual de amenazantes.",
    steps: [
      { n: "1", t: "Evalúa valor: ¿tienes evidencia de que los usuarios lo quieren? Si no, ese es el riesgo más alto." },
      { n: "2", t: "Evalúa usabilidad: ¿alguien ha intentado usar el prototipo sin que le expliques nada?" },
      { n: "3", t: "Evalúa factibilidad: ¿los ingenieros han revisado la propuesta técnicamente?" },
      { n: "4", t: "Evalúa viabilidad: ¿está alineado con la estrategia y los stakeholders clave?" }
    ],
    note: "Cagan: el riesgo no evaluado es el que tumba la feature después de construirla."
  }
};

// ── SUGGESTIONS ──────────────────────────────────────────────────────────────
function getSugg(qid) {
  const e = ans.etapa, m = ans.modelo, ar = ans.area;
  const map = {
    outcome: {
      activation_empathy: ["El X% de nuevos usuarios completa la acción clave dentro de la primera hora sin ayuda", "Los usuarios llegan al 'aha moment' antes de que expire el periodo de prueba", "El X% de usuarios que ven [contenido clave] en el día 1 no piden la baja en el primer mes"],
      activation_stickiness: ["El 50% de usuarios activan la feature principal en su primera semana", "Los usuarios que completan el onboarding tienen un churn 30% menor en el primer mes", "El tiempo hasta la primera acción clave baja de X a Y minutos"],
      retention_any: ["Los usuarios vuelven al producto al menos 3 veces por semana durante el primer mes", "La retención en día 7 sube al menos 10 puntos porcentuales", "Los usuarios que usan esta feature tienen un churn 40% menor"],
      revenue_any: ["Los usuarios que completan este flujo convierten a pago a una tasa 25% mayor", "El tiempo hasta la primera compra se reduce de X días a Y días", "El ticket medio de usuarios que pasan por este flujo es un 15% superior"],
      referral_any: ["Los usuarios actuales invitan al menos a 1 persona nueva durante su primer mes", "El X% de los nuevos registros llega a través de la referencia de un usuario existente", "Los usuarios que refieren a otros muestran una retención significativamente mayor que los que no"],
      acquisition_any: ["El X% de quienes llegan por [canal] completa el registro, frente al Y% actual", "El costo de adquisición por [canal] baja de X a Y", "Los usuarios que llegan por [canal] activan a una tasa igual o mayor que los que llegan por otras vías"],
      default: ["Los nuevos usuarios completan la acción clave dentro de las primeras 24h sin ayuda", "Los usuarios regresan al producto al menos 2 veces por semana durante el primer mes", "El X% de usuarios percibe el valor antes de que expire el periodo de prueba"]
    },
    negocio: {
      mobile: ["Mejora el ARPU al aumentar el % de usuarios que convierten a pago", "Reduce el churn en los primeros 7 días — donde se pierde el 80% de usuarios en mobile", "Mejora el ratio DAU/MAU acercándose al benchmark 30/10/10 de Lean Analytics"],
      saas: ["Baja el churn mensual por debajo del 2% (benchmark excelente Lean Analytics)", "Aumenta el CLV al mejorar la retención temprana — CAC debe ser < 1/3 del CLV", "Sube el MRR retenido al reducir cancelaciones en los primeros 90 días"],
      ecommerce: ["Aumenta la tasa de compra recurrente por encima del 30% (modo lealtad)", "Reduce el abandono del flujo de compra y mejora la conversión", "Sube el ticket medio por cliente en al menos un 15%"],
      default: ["Reduce el churn en el primer mes y aumenta el MRR retenido", "Aumenta la tasa de conversión de prueba a pago", "Genera usuarios satisfechos que refieren — baja el CAC a largo plazo"]
    },
    problema_resumen: {
      activation_any: ["Los usuarios se registran pero no llegan al primer momento de valor — el 'aha moment'", "El onboarding tiene demasiados pasos y los usuarios abandonan antes de ver el beneficio", "Los usuarios no entienden para qué sirve el producto en los primeros 2 minutos"],
      retention_any: ["Los usuarios activan el producto pero no regresan después del primer uso", "No hay un gancho que traiga a los usuarios de vuelta — el producto no forma hábito", "Los usuarios usan el producto una vez pero no ven razón para volver"],
      referral_any: ["Los usuarios están satisfechos pero no encuentran un motivo claro para invitar a otros", "Compartir el producto es complicado o poco visible dentro del flujo actual", "Los usuarios recomiendan de palabra, pero no usan ningún mecanismo dentro del producto"],
      revenue_any: ["Los usuarios usan el producto pero no ven motivo suficiente para pagar o gastar más", "El paso de gratis a pago tiene fricción o no queda claro qué se gana al pagar", "Los usuarios comparan el precio con alternativas y no perciben el valor diferencial"],
      acquisition_any: ["Los usuarios llegan al producto pero no entienden la propuesta de valor antes de irse", "El canal de adquisición trae usuarios que no encajan con el producto y abandonan rápido", "El costo de traer un nuevo usuario es más alto de lo que el negocio puede sostener"],
      default: ["Los usuarios no entienden qué deben hacer después de registrarse y abandonan", "Los usuarios llegan al producto pero no encuentran el valor antes de que se agote su paciencia", "Los usuarios saben que el producto existe pero no lo convierten en hábito"]
    },
    preguntas_investigacion: {

const SYSTEM_PROMPT = `Sos un product manager senior con dominio profundo de Torres (Continuous Discovery Habits), Cagan (Inspired), Seiden (Outcomes Over Output), Fitzpatrick (The Mom Test), Singer (Shape Up), Maurya (Running Lean) y Croll & Yoskovitz (Lean Analytics).

Tu trabajo es recibir las respuestas de un PM a un cuestionario estructurado y generar un Feature Brief con criterio propio. No transcribís las respuestas — las evaluás, las tensás donde es necesario, y producís un documento que sirva como base real para tomar decisiones de producto. Escribís en español.

## Criterio de calidad

**Outcomes:** Un outcome válido describe un cambio observable en el comportamiento del usuario y una métrica que lo captura. Formato esperado: "[Quién] hará [comportamiento] lo que resultará en [métrica]." Si el outcome describe lo que se construirá en lugar de lo que cambiará en el usuario, es un output — señalalo como advertencia.

**Supuestos críticos:** Un supuesto válido es específico y falseable. Si es falso, la solución se cae. "Que los usuarios quieran usarlo" no es un supuesto — es una esperanza. Un supuesto válido tiene este nivel de especificidad: "Suponemos que los usuarios entienden el paso 3 sin instrucciones — no lo hemos testeado con nadie externo al equipo."

**Hipótesis:** Una hipótesis válida tiene la estructura "Si hacemos X, entonces Y cambiará en Z." Necesita especificar qué métrica cambia y en cuánto. Sin número no es hipótesis — señalalo.

**Coherencia entre secciones:** El supuesto crítico, el experimento y la hipótesis deben atacar el mismo riesgo. Si no están alineados entre sí, es una advertencia. Si el riesgo principal declarado es "valor" pero el experimento descrito es un A/B test de UI, algo no cierra.

**Riesgos:** Si el PM declara riesgo bajo en alguna dimensión pero la evidencia de validación es solo una intuición del equipo, eso es una contradicción que hay que señalar.

**Un brief es genérico cuando:** el outcome podría aplicar a cualquier feature de cualquier producto; el problema no describe una situación real de un usuario en un contexto específico; la hipótesis no tiene números; o los riesgos están todos en bajo sin evidencia que lo respalde.

## Campos pendientes

Cuando un campo llega con el valor "unclear", el PM no tiene respuesta todavía.
- Nunca inventes contenido ni rellenes con texto plausible.
- Usá el objeto { "pending": true, "tarea": "..." } donde tarea es una oración concreta y accionable — específica al contexto de esta feature, no genérica. Aplicá el framework correspondiente a ese campo: si el outcome es unclear, la tarea viene de Seiden; si el supuesto es unclear, viene de Torres y Maurya; si la métrica es unclear, viene de Lean Analytics.

## Advertencias

Detectá activamente estas condiciones e incluílas en el array advertencias. No las menciones dentro del contenido de los campos — solo en advertencias.

Tipos válidos:
- "output_vs_outcome" — el outcome describe una feature entregada, no un cambio de comportamiento.
- "supuesto_no_falseable" — el supuesto es una esperanza o está formulado de forma irrefutable.
- "hipotesis_sin_metrica" — la hipótesis no especifica qué cambia ni en cuánto.
- "riesgo_contradictorio" — el nivel de riesgo declarado no es consistente con la evidencia disponible.
- "solucion_prematura" — hay una solución descripta en detalle antes de validar el problema.
- "desalineacion_validacion" — el supuesto, el experimento y la hipótesis no atacan el mismo riesgo.
- "otro" — cualquier otro problema de calidad que afecte la utilidad del brief.

## Formato de output

Respondé ÚNICAMENTE con un objeto JSON válido. Sin texto antes ni después. Sin bloques de código markdown. Sin comentarios dentro del JSON. Solo el JSON.

No agregues campos fuera del esquema.

Para los campos con contenido del usuario, escribí el texto en español profesional y claro, fiel al significado original. No agregues información que el usuario no proporcionó — el enriquecimiento va en los campos de síntesis (riesgos.lectura, norte.nota_reformulacion) y en las advertencias.

Esquema exacto:

{
  "feature_name": string,
  "estado": "listo_para_desarrollo" | "discovery_en_curso",
  "advertencias": [
    { "campo": string, "tipo": string, "texto": string }
  ],
  "contexto": {
    "etapa": string,
    "modelo": string,
    "area": string
  },
  "norte": {
    "outcome_esperado": string | { "pending": true, "tarea": string },
    "conexion_negocio": string | { "pending": true, "tarea": string },
    "problema_o_solucion": "problema" | "solucion" | "mixto",
    "nota_reformulacion": string | null
  },
  "oportunidad": {
    "problema": string | { "pending": true, "tarea": string },
    "preguntas_investigacion": string,
    "evidencia_actual": string
  },
  "riesgos": {
    "valor": "bajo" | "medio" | "alto",
    "usabilidad": "bajo" | "medio" | "alto",
    "factibilidad": "bajo" | "medio" | "alto",
    "viabilidad": "bajo" | "medio" | "alto",
    "riesgo_principal": string | { "pending": true, "tarea": string },
    "lectura": string
  },
  "validacion": {
    "supuesto_critico": string | { "pending": true, "tarea": string },
    "experimento_minimo": string | { "pending": true, "tarea": string },
    "hipotesis": string | { "pending": true, "tarea": string },
    "criterio_exito": string | { "pending": true, "tarea": string }
  },
  "shape": {
    "appetite": string,
    "solucion_propuesta": string | { "pending": true, "tarea": string },
    "fuera_alcance": string | null,
    "rabbit_holes": string | null
  },
  "metricas": {
    "omtm": string | { "pending": true, "tarea": string },
    "benchmark": string | { "pending": true, "tarea": string },
    "vanity_check": string | null
  }
}

Notas sobre campos específicos:
- norte.nota_reformulacion: solo cuando problema_o_solucion es "solucion" o "mixto". Una oración que reformula la solución recibida como problema a resolver. null en los demás casos.
- riesgos.lectura: una oración que sintetiza el perfil de riesgo de la feature — qué combinación presentan los cuatro ejes y qué implica para las decisiones inmediatas. Este campo es tuyo, no del usuario.
- oportunidad.evidencia_actual: siempre un string con el label legible del nivel de validación — nunca pending.
- estado: "discovery_en_curso" si hay al menos un campo con pending true. "listo_para_desarrollo" si todos los campos clave tienen contenido.
- advertencias puede ser [] si no hay ninguna.`;

// ── API INTEGRATION ──────────────────────────────────────────────────────────
function buildPayload(ans) {
  const POL = { problema: 'Un problema a resolver', solucion: 'Una solución ya definida', mixto: 'Mezcla de ambos' };
  const fv = v => (!v || v === 'unclear') ? 'pendiente de discovery' : v;
  const line = (label, val) => val ? `${label}: ${val}\n` : '';

  let out = `Feature: ${ans.feature_name || '(sin nombre)'}\n\n`;

  out += `CONTEXTO\n`;
  out += line('Etapa del producto', EL[ans.etapa]);
  out += line('Modelo de negocio', ML[ans.modelo]);
  out += line('Área AARRR', AL[ans.area]);

  out += `\nNORTE (Seiden · Cagan)\n`;
  out += line('Outcome esperado', fv(ans.outcome));
  out += line('Conexión con el negocio', fv(ans.negocio));
  out += line('¿Problema o solución?', POL[ans.problema_o_solucion]);

  out += `\nOPORTUNIDAD (Torres · Fitzpatrick)\n`;
  out += line('Problema — hipótesis a contrastar', fv(ans.problema_resumen));
  out += line('Preguntas de investigación', ans.preguntas_investigacion);
  out += line('Validación actual', EVL[ans.evidencia_actual]);

  out += `\nRIESGOS (Cagan · Maurya)\n`;
  out += line('Riesgo de valor', ans.riesgo_valor);
  out += line('Riesgo de usabilidad', ans.riesgo_usabilidad);
  out += line('Riesgo de factibilidad', ans.riesgo_factibilidad);
  out += line('Riesgo de viabilidad', ans.riesgo_viabilidad);
  out += line('Riesgo principal', fv(ans.riesgo_principal));

  out += `\nVALIDACIÓN (Maurya · Torres)\n`;
  out += line('Supuesto crítico', fv(ans.supuesto_critico));
  out += line('Experimento mínimo', fv(ans.experimento));
  out += line('Hipótesis', fv(ans.hipotesis));
  out += line('Criterio de éxito/fracaso', fv(ans.criterio_exito));

  out += `\nSHAPE (Singer)\n`;
  out += line('Appetite', APL[ans.appetite]);
  out += line('Solución propuesta', fv(ans.solucion_propuesta));
  out += line('Fuera del alcance', ans.fuera_alcance);
  out += line('Rabbit holes', ans.rabbit_holes);

  out += `\nMÉTRICAS (Lean Analytics · Seiden)\n`;
  out += line('OMTM', fv(ans.omtm));
  out += line('Benchmark', fv(ans.benchmark));
  out += line('Vanity metric a evitar', ans.vanity_check);

  return out.trim();
}

async function callAPI(payload) {
  const container = document.getElementById('stageContainer');

  container.innerHTML = '';
  const loadDiv = document.createElement('div');
  loadDiv.style.cssText = 'opacity:0;animation:fadeUp 0.5s ease forwards;padding:3rem 0;text-align:center;';
  loadDiv.innerHTML = `
    <div style="font-size:14px;color:var(--text-muted);margin-bottom:0.5rem;">Generando brief...</div>
    <div style="font-size:12px;color:var(--text-dim);">Claude está analizando tus respuestas</div>`;
  container.appendChild(loadDiv);

  const key = sessionStorage.getItem('fa_api_key');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: payload }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `Error ${res.status} — revisá que la API key sea válida.`);
    }

    const data = await res.json();
    let text = (data.content?.[0]?.text || '').trim();
    text = text.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
    return JSON.parse(text);

  } catch (err) {
    container.innerHTML = '';
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'opacity:0;animation:fadeUp 0.5s ease forwards;';

    const alertBox = document.createElement('div');
    alertBox.className = 'alert alert-warning';
    alertBox.style.marginBottom = '1.5rem';

    const title = document.createElement('strong');
    title.textContent = err instanceof SyntaxError
      ? 'La API respondió con un formato inesperado. Intentá de nuevo.'
      : 'No se pudo generar el brief.';
    alertBox.appendChild(title);

    if (!(err instanceof SyntaxError)) {
      const detail = document.createElement('div');
      detail.style.cssText = 'margin-top:4px;font-size:12px;';
      detail.textContent = err.message;
      alertBox.appendChild(detail);
    }

    errDiv.appendChild(alertBox);

    const nav = document.createElement('div');
    nav.className = 'nav-row';
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-back';
    backBtn.textContent = '← Volver al cuestionario';
    backBtn.onclick = () => { cs--; cq = STAGES[cs].questions.length - 1; renderProgress(); renderStage(); };
    nav.appendChild(backBtn);
    errDiv.appendChild(nav);

    container.appendChild(errDiv);
    return null;
  }
}

  const div = document.createElement('div');
  div.style.cssText = 'opacity:0;animation:fadeUp 0.5s ease forwards;';
  div.innerHTML = `
    <div style="margin-bottom:1.5rem">
      <div class="stage-tag">Configuración</div>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:0.5rem">
        Esta herramienta usa la API de Anthropic para generar el Feature Brief.<br>
        Tu key se guarda solo en esta sesión del navegador y nunca sale de tu dispositivo.
      </p>
    </div>
    <div style="margin-bottom:1.25rem">
      <div class="output-label" style="margin-bottom:6px">Anthropic API key</div>

    </div>

function saveKey() {
  const val = document.getElementById('keyInput')?.value?.trim();
  if (!val || !val.startsWith('sk-ant-')) {
    alert('Ingresá una API key válida de Anthropic (empieza con sk-ant-).');
    return;
  }
  sessionStorage.setItem('fa_api_key', val);
  document.querySelector('.progress-wrap').style.visibility = 'visible';
  document.getElementById('forgetKeyWrap').style.display = 'block';
  renderProgress();
  renderStage();
}

function forgetKey() {
  if (!confirm('¿Borrar la API key de esta sesión?')) return;
  sessionStorage.removeItem('fa_api_key');
  document.getElementById('forgetKeyWrap').style.display = 'none';
  renderKeyEntry();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderProgress() {
  const w = document.getElementById('progressStages');
  w.innerHTML = '';
  STAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'progress-stage' + (i < cs ? ' done' : i === cs ? ' active' : '');
    w.appendChild(d);
  });
  document.getElementById('progressLabel').textContent = `Etapa ${cs+1} de ${STAGES.length}`;
  document.getElementById('progressName').textContent = STAGES[cs]?.tag?.split('—')[1]?.trim() || 'Listo';
}

function renderStage() {
  const container = document.getElementById('stageContainer');
  container.innerHTML = '';
  if (cs >= STAGES.length) { renderOutput(container); return; }

  const stage = STAGES[cs], q = stage.questions[cq];

  if (cq === 0) {
    const sh = document.createElement('div');
    sh.style.cssText = 'opacity:0;animation:fadeUp 0.5s ease forwards;margin-bottom:1.5rem;';
    sh.innerHTML = `<div class="stage-tag">${stage.tag}</div>${stage.source ? `<div class="stage-source">Basado en: ${stage.source}</div>` : ''}`;
    container.appendChild(sh);
    const hr = document.createElement('hr'); hr.className = 'divider';
    container.appendChild(hr);
  }

  const qBlock = document.createElement('div');
  qBlock.className = 'question-block'; qBlock.style.animationDelay = '0.1s';
  let inner = `<div class="question-text">${q.text}</div>`;
  if (q.hint) inner += `<div class="question-hint">${q.hint}</div>`;
  if (q.alert) inner += `<div class="alert alert-${q.alert.type}">${q.alert.text}</div>`;

  if (q.type === 'options' || q.type === 'options_with_unclear') {
    inner += '<div class="options">';
    q.options.forEach(opt => {
      const sel = ans[q.id] === opt.value ? ' selected' : '';
      inner += `<button class="option${sel}" onclick="selectOption('${q.id}','${opt.value}',this)">${opt.label}${opt.note?`<span class="option-note">${opt.note}</span>`:''}`;
      inner += `</button>`;
    });
    if (q.type === 'options_with_unclear' || q.discoveryKey) {
      const selU = ans[q.id] === 'unclear' ? ' selected' : '';
      inner += `<button class="option option-unclear${selU}" onclick="selectOption('${q.id}','unclear',this)">No lo tengo claro todavía<span class="option-note">El asistente te guiará para resolver este punto antes de continuar</span></button>`;
    }
    inner += '</div>';
  } else if (q.type === 'text_with_suggestions') {
    const suggs = getSugg(q.id);
    if (suggs.length > 0) {
      inner += `<div class="suggestions-label">Sugerencias basadas en tu contexto — pulsa para usar</div><div class="suggestions" id="sugg_${q.id}">`;
      suggs.forEach((s,i) => { inner += `<button class="suggestion-chip" onclick="useSugg('${q.id}',${i})">${s}</button>`; });
      inner += '</div>';
    }
    if (q.discoveryKey) {
      inner += `<button class="option option-unclear" style="margin-bottom:10px;width:100%" onclick="showDiscovery('${q.id}','${q.discoveryKey}')">No lo tengo claro todavía<span class="option-note">El asistente te guiará para resolver este punto antes de continuar</span></button>`;
    }
    const val = ans[q.id] && ans[q.id] !== 'unclear' ? ans[q.id] : '';
    inner += `<textarea class="text-input" id="textInput_${q.id}" placeholder="${q.placeholder||''}" oninput="ans['${q.id}']=this.value">${val}</textarea>`;
  } else {
    const val = ans[q.id] || '';
    inner += `<textarea class="text-input" id="textInput_${q.id}" placeholder="${q.placeholder||''}" oninput="ans['${q.id}']=this.value">${val}</textarea>`;
  }

  qBlock.innerHTML = inner;
  container.appendChild(qBlock);

  // Discovery box if unclear selected
  if (ans[q.id] === 'unclear' && q.discoveryKey) {
    renderDiscoveryBox(container, q.discoveryKey, q.id);
  }

  const nav = document.createElement('div');
  nav.className = 'nav-row';
  nav.style.cssText = 'opacity:0;animation:fadeUp 0.5s 0.15s ease forwards;';
  const isFirst = cs === 0 && cq === 0;
  const isLastQ = cq === stage.questions.length - 1;
  const isLastStage = cs === STAGES.length - 1;
  const nextLabel = isLastQ && isLastStage ? 'Generar documento' : isLastQ ? 'Siguiente etapa →' : 'Continuar →';
  nav.innerHTML = `${!isFirst?'<button class="btn-back" onclick="goBack()">← Atrás</button>':''}<button class="btn-next" onclick="goNext()">${nextLabel}</button>`;
  container.appendChild(nav);

  if (stage.questions.length > 1) {
    const c = document.createElement('div'); c.className = 'q-counter';
    c.textContent = `Pregunta ${cq+1} de ${stage.questions.length} en esta etapa`;
    container.appendChild(c);
  }
}

function renderDiscoveryBox(container, key, qid) {
  const d = DISCOVERY[key];
  if (!d) return;
  const box = document.createElement('div');
  box.className = 'discovery-box'; box.id = `dbox_${qid}`;
  let inner = `<div class="discovery-box-title">Discovery pendiente — ${d.title}</div>`;
  inner += `<p>${d.why}</p>`;
  inner += `<p style="font-size:13px;color:var(--accent);margin-bottom:8px;">¿Cómo resolverlo?</p>`;
  d.steps.forEach(s => {
    inner += `<div class="discovery-step"><span class="discovery-step-num">${s.n}.</span><span>${s.t}</span></div>`;
  });
  inner += `<div class="discovery-note">${d.note}</div>`;
  box.innerHTML = inner;
  container.appendChild(box);
}

function showDiscovery(qid, key) {
  ans[qid] = 'unclear';
  const existing = document.getElementById(`dbox_${qid}`);
  if (!existing) {
    const nav = document.querySelector('.nav-row');
    renderDiscoveryBox(document.getElementById('stageContainer'), key, qid);
    // Move box before nav
    const box = document.getElementById(`dbox_${qid}`);
    if (box && nav) { nav.parentNode.insertBefore(box, nav); }
  }
}

function useSugg(qid, idx) {
  const s = getSugg(qid); const text = s[idx];
  const ta = document.getElementById(`textInput_${qid}`);
  if (ta) { ta.value = text; ans[qid] = text; }
  document.querySelectorAll(`#sugg_${qid} .suggestion-chip`).forEach((c,i) => c.classList.toggle('used', i===idx));
  // Hide discovery box if visible
  const box = document.getElementById(`dbox_${qid}`);
  if (box) box.style.display = 'none';
}

function selectOption(id, value, el) {
  ans[id] = value;
  el.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  // Show/hide discovery box for option-type questions
  const q = STAGES[cs].questions[cq];
  const existing = document.getElementById(`dbox_${id}`);
  if (value === 'unclear' && q.discoveryKey) {
    if (!existing) {
      const nav = document.querySelector('.nav-row');
      renderDiscoveryBox(document.getElementById('stageContainer'), q.discoveryKey, id);
      const box = document.getElementById(`dbox_${id}`);
      if (box && nav) nav.parentNode.insertBefore(box, nav);
    } else { existing.style.display = 'block'; }
  } else if (existing) { existing.style.display = 'none'; }
}

async function goNext() {
  const stage = STAGES[cs], q = stage.questions[cq];
  if (q.type === 'options' || q.type === 'options_with_unclear') {
    if (!ans[q.id]) { alert('Por favor selecciona una opción antes de continuar.'); return; }
  } else {
    const val = document.getElementById(`textInput_${q.id}`)?.value?.trim();
    if (!val && ans[q.id] !== 'unclear') { alert('Por favor escribe o selecciona una respuesta antes de continuar.'); return; }
    if (val) ans[q.id] = val;
  }
  if (cq < stage.questions.length - 1) cq++;
  else { cs++; cq = 0; }
  renderProgress();
  if (cs >= STAGES.length) {
    const brief = await callAPI(buildPayload(ans));
    if (brief) renderBriefFromJSON(brief);
    return;
  }
  renderStage();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goBack() {
  if (cq > 0) cq--;
  else if (cs > 0) { cs--; cq = STAGES[cs].questions.length - 1; }
  renderProgress(); renderStage();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── OUTPUT ───────────────────────────────────────────────────────────────────
function getCtxMetrics() {
  const metrics = [], e=ans.etapa, m=ans.modelo, ar=ans.area;
  if (e==='empathy') metrics.push('Señales cualitativas — ¿el problema duele lo suficiente?');
  if (e==='stickiness'&&m==='mobile') { metrics.push('Retención día 1 (25–40%)'); metrics.push('Retención día 7 (10–20%)'); metrics.push('Ratio DAU/MAU (30/10/10)'); }
  if (e==='stickiness'&&m==='saas') { metrics.push('Churn mensual (<2% excelente, >5% crítico)'); metrics.push('Engagement por cohorte'); }
  if (e==='revenue') metrics.push('CAC / CLV — CAC debe ser < 1/3 del CLV');
  if (e==='revenue'&&m==='saas') metrics.push('MRR — adiciones netas');
  if (e==='revenue'&&m==='mobile') { metrics.push('ARPU'); metrics.push('% usuarios que pagan'); }
  if (e==='virality') metrics.push('Coeficiente viral (>0.75 bueno, >1.0 óptimo)');
  if (ar==='activation') { metrics.push('Tasa de activación — % que completan la acción clave'); metrics.push('Tiempo hasta el primer valor percibido'); }
  if (ar==='retention') metrics.push('Retención por cohorte día 1 / 7 / 30');
  if (ar==='revenue') { metrics.push('Tasa de conversión a pago'); metrics.push('ARPU'); }
  if (ar==='referral') { metrics.push('Coeficiente viral'); metrics.push('% usuarios que refieren'); }
  if (!metrics.length) metrics.push('Define la OMTM según la pregunta más importante de tu etapa actual');
  return [...new Set(metrics)];
}

const EL={empathy:'Empatía',stickiness:'Adhesión',virality:'Viralidad',revenue:'Ingresos',scale:'Escala'};
const ML={saas:'SaaS / suscripción',mobile:'Mobile app / freemium',ecommerce:'E-commerce',marketplace:'Marketplace',media:'Media / contenido',ugc:'UGC'};
const AL={acquisition:'Adquisición',activation:'Activación',retention:'Retención',revenue:'Revenue',referral:'Referral'};
const APL={small:'Small batch (1–2 semanas)',medium:'Medium batch (3–4 semanas)',big:'Big batch (6 semanas)'};
const EVL={validada:'✓ Ya hablé con usuarios y vi el problema repetirse',parcial:'Señales indirectas — falta contrastar con usuarios',hipotesis:'Intuición del equipo — punto de partida para investigar'};

function fmtVal(key) {
  const v = ans[key];
  if (!v || v === 'unclear') {
    const dk = STAGES.flatMap(s=>s.questions).find(q=>q.id===key)?.discoveryKey;
    const d = dk && DISCOVERY[dk];
    return `<div class="pending-badge">Discovery pendiente</div>${d?`<div class="pending-task">${d.steps[0].t}</div>`:''}`;
  }
  return `<div>${v}</div>`;
}

function rb(val) {
  if (val==='bajo') return '<span class="risk-badge risk-low">Bajo</span>';
  if (val==='medio') return '<span class="risk-badge risk-med">Medio</span>';
  if (val==='alto') return '<span class="risk-badge risk-high">Alto</span>';
  return '<span class="risk-badge" style="color:var(--text-dim);border-color:var(--border)">Sin evaluar</span>';
}

function getPendingTasks() {
  const tasks = [];
  STAGES.flatMap(s=>s.questions).forEach(q => {
    if (ans[q.id] === 'unclear' && q.discoveryKey) {
      const d = DISCOVERY[q.discoveryKey];
      if (d) tasks.push({ question: q.text, title: d.title, steps: d.steps });
    }
  });
  return tasks;
}

        <span class="output-section-tag" style="color:var(--warning)">Discovery</span>
        <span class="output-section-title">Trabajo pendiente antes de construir</span>
      </div>
      <div class="output-section-body">
        ${pending.map((p,i) => `
          <div class="output-row">
            <div class="output-label">${p.title}</div>
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">${p.question}</div>
            ${p.steps.map(s=>`<div class="pending-task">${s.n}. ${s.t}</div>`).join('')}
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  div.innerHTML = `
    <div style="margin-bottom:2rem">
      <div class="stage-tag">Feature Brief</div>
      <div class="output-title">${ans.feature_name||'Feature Brief'}</div>
      <div class="output-meta">${today}${pending.length>0?' · '+pending.length+' punto(s) de discovery pendiente':''}</div>
    </div>
    ${pendingSection}
    <div class="output-section">

function pendingFromBrief(brief) {
  const LABELS = {
    outcome_esperado:'Outcome esperado', conexion_negocio:'Conexión con el negocio',
    problema:'Problema — hipótesis a contrastar', riesgo_principal:'Riesgo principal',
    supuesto_critico:'Supuesto crítico', experimento_minimo:'Experimento mínimo',
    hipotesis:'Hipótesis', criterio_exito:'Criterio de éxito/fracaso',
    solucion_propuesta:'Solución propuesta', omtm:'OMTM', benchmark:'Benchmark'
  };
  const tasks = [];
  ['norte','oportunidad','riesgos','validacion','shape','metricas'].forEach(sec => {
    Object.entries(brief[sec] || {}).forEach(([k, v]) => {
      if (v && typeof v === 'object' && v.pending)
        tasks.push({ label: LABELS[k] || k, tarea: v.tarea });
    });
  });
  return tasks;
}
